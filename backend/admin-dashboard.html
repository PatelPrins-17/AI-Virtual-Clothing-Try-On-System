<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Dressify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        h1 {
            color: #0891b2;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            color: #64748b;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(135deg, #06b6d4, #0891b2);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #0891b2;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #64748b;
            font-size: 14px;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e5e7eb;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #0891b2;
        }

        .refresh-btn {
            background: #06b6d4;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: #0891b2;
            transform: translateY(-2px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            color: #0891b2;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            font-size: 14px;
        }

        tr:hover {
            background: #f0fdfa;
        }

        .activity-item {
            padding: 15px;
            border-left: 3px solid #06b6d4;
            background: #f0fdfa;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .activity-time {
            color: #64748b;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .activity-text {
            color: #0f172a;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #0891b2;
        }

        .error {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: #d1fae5;
            color: #065f46;
        }

        @media (max-width: 768px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-shield-alt"></i> Admin Dashboard</h1>
            <p class="subtitle">Dressify - AI Virtual Try-On System Management</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-value" id="totalUsers">0</div>
                <div class="stat-label">Total Users</div>
            </div>

            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-user-plus"></i>
                </div>
                <div class="stat-value" id="todayUsers">0</div>
                <div class="stat-label">New Users Today</div>
            </div>

            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-tshirt"></i>
                </div>
                <div class="stat-value" id="totalTryOns">0</div>
                <div class="stat-label">Total Try-Ons</div>
            </div>

            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-server"></i>
                </div>
                <div class="stat-value">
                    <span class="badge badge-success">Online</span>
                </div>
                <div class="stat-label">Server Status</div>
            </div>
        </div>

        <div class="content-grid">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title"><i class="fas fa-users"></i> Recent Users</h2>
                    <button class="refresh-btn" onclick="loadData()">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
                <div id="error"></div>
                <div id="loading" class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading data...
                </div>
                <div style="overflow-x: auto;">
                    <table id="usersTable" style="display: none;">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Mobile</th>
                                <th>Joined</th>
                            </tr>
                        </thead>
                        <tbody id="usersBody">
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 class="card-title"><i class="fas fa-clock"></i> Recent Activity</h2>
                </div>
                <div id="activityList">
                    <div class="activity-item">
                        <div class="activity-time">Just now</div>
                        <div class="activity-text">System started successfully</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadData() {
            const loading = document.getElementById('loading');
            const table = document.getElementById('usersTable');
            const errorDiv = document.getElementById('error');
            const tbody = document.getElementById('usersBody');

            loading.style.display = 'block';
            table.style.display = 'none';
            errorDiv.innerHTML = '';

            try {
                const response = await fetch('http://localhost:5002/api/users');
                const result = await response.json();

                if (result.success) {
                    const users = result.data;
                    
                    // Update stats
                    document.getElementById('totalUsers').textContent = users.length;
                    
                    // Calculate today's users
                    const today = new Date().toDateString();
                    const todayUsers = users.filter(u => 
                        new Date(u.createdAt).toDateString() === today
                    ).length;
                    document.getElementById('todayUsers').textContent = todayUsers;

                    // Clear table
                    tbody.innerHTML = '';

                    // Populate table (show last 10 users)
                    users.slice(0, 10).forEach(user => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${user.id}</td>
                            <td>${user.name}</td>
                            <td>${user.email}</td>
                            <td>${user.mobile || 'N/A'}</td>
                            <td>${new Date(user.createdAt).toLocaleDateString()}</td>
                        `;
                        tbody.appendChild(row);
                    });

                    // Update activity
                    updateActivity(users);

                    loading.style.display = 'none';
                    table.style.display = 'table';
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                loading.style.display = 'none';
                errorDiv.innerHTML = `<div class="error"><i class="fas fa-exclamation-circle"></i> Error: ${error.message}</div>`;
            }
        }

        function updateActivity(users) {
            const activityList = document.getElementById('activityList');
            activityList.innerHTML = '';

            // Show last 5 user registrations
            users.slice(0, 5).forEach(user => {
                const item = document.createElement('div');
                item.className = 'activity-item';
                
                const timeAgo = getTimeAgo(new Date(user.createdAt));
                
                item.innerHTML = `
                    <div class="activity-time">${timeAgo}</div>
                    <div class="activity-text">
                        <i class="fas fa-user-plus"></i> ${user.name} registered
                    </div>
                `;
                activityList.appendChild(item);
            });
        }

        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            
            if (seconds < 60) return 'Just now';
            if (seconds < 3600) return Math.floor(seconds / 60) + ' minutes ago';
            if (seconds < 86400) return Math.floor(seconds / 3600) + ' hours ago';
            return Math.floor(seconds / 86400) + ' days ago';
        }

        // Load data on page load
        loadData();

        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
