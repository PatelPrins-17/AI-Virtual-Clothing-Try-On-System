<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Viewer - Dressify</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h1 {
            color: #0891b2;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        .stat-box {
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            flex: 1;
        }

        .stat-box h3 {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-box p {
            font-size: 28px;
            font-weight: bold;
        }

        .table-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #0891b2;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
        }

        tr:hover {
            background: #f0fdfa;
        }

        .refresh-btn {
            background: #06b6d4;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .refresh-btn:hover {
            background: #0891b2;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #0891b2;
        }

        .error {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗄️ Database Viewer</h1>
            <p>SQLite Database - Real-time User Data</p>
            <div class="stats">
                <div class="stat-box">
                    <h3>Total Users</h3>
                    <p id="totalUsers">0</p>
                </div>
                <div class="stat-box">
                    <h3>Last Updated</h3>
                    <p id="lastUpdated" style="font-size: 16px;">-</p>
                </div>
            </div>
        </div>

        <div class="table-container">
            <button class="refresh-btn" onclick="loadUsers()">🔄 Refresh Data</button>
            <div id="error"></div>
            <div id="loading" class="loading">Loading users...</div>
            <table id="usersTable" style="display: none;">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Mobile</th>
                        <th>Created At</th>
                    </tr>
                </thead>
                <tbody id="usersBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadUsers() {
            const loading = document.getElementById('loading');
            const table = document.getElementById('usersTable');
            const errorDiv = document.getElementById('error');
            const tbody = document.getElementById('usersBody');

            loading.style.display = 'block';
            table.style.display = 'none';
            errorDiv.innerHTML = '';

            try {
                const response = await fetch('http://localhost:5002/api/users');
                const result = await response.json();

                if (result.success) {
                    const users = result.data;
                    
                    // Update stats
                    document.getElementById('totalUsers').textContent = users.length;
                    document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();

                    // Clear table
                    tbody.innerHTML = '';

                    // Populate table
                    users.forEach(user => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${user.id}</td>
                            <td>${user.name}</td>
                            <td>${user.email}</td>
                            <td>${user.mobile || 'N/A'}</td>
                            <td>${new Date(user.createdAt).toLocaleString()}</td>
                        `;
                        tbody.appendChild(row);
                    });

                    loading.style.display = 'none';
                    table.style.display = 'table';
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                loading.style.display = 'none';
                errorDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }

        // Load users on page load
        loadUsers();

        // Auto-refresh every 10 seconds
        setInterval(loadUsers, 10000);
    </script>
</body>
</html>
